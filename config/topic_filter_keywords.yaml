# -----------------------------------------------------------------------------
# Explicit out-of-scope keywords — flag for filter exclusion if dominant
# -----------------------------------------------------------------------------
excluded_signals:
  # Single-stock / micro topics
  - earnings beat
  - earnings miss
  - quarterly results
  - guidance raised
  - price target
  - buy rating
  - analyst upgrade
  - analyst downgrade
  # Pure crypto speculation (NOT crypto-as-macro)
  - meme coin
  - altcoin
  - shitcoin
  - NFT
  # Personal finance
  - personal loan
  - credit score
  - retirement planning
  - 401k tips
