# =============================================================================
# Topic Filter Keywords — JEL-anchored canonical list
# =============================================================================
# Macro-financial keyword set used as the single source of truth for topic
# filtering at BOTH stages of the pipeline:
#
#   Stage 1 (per-ingestor pre-fetch) — institutional.py ingestors apply this
#     same keyword set as an inline title filter to skip irrelevant
#     publications before downloading them. ADR-015 (2026-05-18) eliminated
#     the prior per-source ad-hoc inline filter lists.
#
#   Stage 2 (post-ingest canonical filter) — src/mnd/filtering/topic_filter.py
#     applies this list as the keyword gate of a two-gate hybrid filter.
#     An article must contain at least `filtering.topic.keyword_min_matches`
#     terms from this list AND pass an embedding-similarity check against
#     data/anchors/topic_seed_articles.jsonl.
#
# Methodology rationale: the keyword set is anchored to the JEL (Journal of
# Economic Literature) Classification System maintained by the American
# Economic Association. Each category is annotated with the JEL subcode(s)
# it operationalizes; additions are justified by JEL coverage gaps. The
# audit document (docs/filter_audit_jel.md) explains the in-scope codes
# (E macroeconomics, F international, G financial, H6 fiscal) and which
# JEL areas are intentionally excluded (D micro, I health, J labor general,
# L industrial org, etc.).
#
# DO NOT lower keyword_min_matches without justification — single-keyword
# matches admit a flood of off-topic articles (e.g., a piece mentioning
# "inflation" of NFT prices).
# =============================================================================

schema_version: "2.0.0"

methodology:
  taxonomy: "JEL Classification System (American Economic Association)"
  in_scope_codes:
    - "E"     # Macroeconomics and Monetary Economics (all subcodes)
    - "F1"    # International Trade
    - "F3"    # International Finance
    - "F4"    # Macroeconomic Aspects of International Trade and Finance
    - "F5"    # International Relations, National Security, IPE
    - "F6"    # Economic Impacts of Globalization
    - "G1"    # General Financial Markets
    - "G2"    # Financial Institutions and Services
    - "G33"   # Bankruptcy / Liquidation
    - "H6"    # National Budget, Deficit, Debt
    - "Q4"    # Energy (only where macro-relevant — oil price shocks)
    - "R31"   # Housing Demand
  out_of_scope_codes:
    [D, I, J_general, L, M, N, "O (except F-relevant)", "Q (except Q4)", "R (except R31)", Z]
  rationale_doc: docs/filter_audit_jel.md
  stage_policy: |
    Identical keyword set at Stage 1 (per-ingestor inline filter) and
    Stage 2 (canonical filter). No source has a bespoke filter. See ADR-015.

