# =============================================================================
# Topic Filter Keywords
# =============================================================================
# Macro-financial keyword seed list used by the topic filter (Stage 2).
#
# An article passes the keyword check if it contains AT LEAST
# `filtering.topic.keyword_min_matches` (default: 2) terms from this list.
# It must ALSO pass the embedding-similarity check against
# data/anchors/topic_seed_articles.jsonl.
#
# Both checks are required (AND, not OR) to prevent over-broad ingestion.
#
# DO NOT lower keyword_min_matches without justification — single-keyword
# matches admit a flood of off-topic articles (a Reuters piece mentioning
# "inflation" of NFT prices, etc.).
# =============================================================================

