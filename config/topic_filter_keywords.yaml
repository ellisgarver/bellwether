    # Each entry corresponds to a JEL-in-scope shock and is documented in
    # data/anchors/anchor_narratives.jsonl. Including these explicitly
    # captures anchor-relevant content that purely concept-driven keywords
    # would miss (e.g., COVID-19 / Brexit anchor recovery).
    jel: [E32, F4, F51, G21, H6]
    keywords:
      # Pandemic shock (COVID anchor)
      - COVID-19
      - COVID
      - pandemic
      - lockdown
      - reopening
