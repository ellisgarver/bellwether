      - SVB
      - First Republic
      - Credit Suisse
      - taper tantrum

# -----------------------------------------------------------------------------
# Explicit out-of-scope keywords — flag for filter exclusion if dominant
# -----------------------------------------------------------------------------
excluded_signals:
  # Single-stock / micro topics (out-of-scope JEL G3 corporate finance detail)
  - earnings beat
  - earnings miss
  - quarterly results
  - guidance raised
  - price target
  - buy rating
  - analyst upgrade
  - analyst downgrade
  # Pure crypto speculation (NOT crypto-as-macro)
  - meme coin
  - altcoin
  - shitcoin
  - NFT
  # Personal finance (JEL D14 — out of scope)
  - personal loan
  - credit score
  - retirement planning
  - 401k tips
