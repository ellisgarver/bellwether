# =============================================================================
# Outlet / Source Whitelist — Phase 2 Final Architecture
# =============================================================================
# Finalized 2026-05-04. Supersedes all prior versions.
#
# The semantic corpus (text for embedding and clustering) has four tiers:
#
#   Tier 1 — Institutional policy:  Fed (all), IMF, BIS, CEA, CBO, Treasury/OFR/FSOC
#   Tier 2 — Academic analytical:   NBER, SSRN, VoxEU/CEPR
#   Tier 3 — Policy-journalism bridge: Brookings, PIIE
#   Tier 4 — Wire journalism:        AP News (2010–present)
#
# The DYNAMICS LAYER (volume time series for SIR/logistic fitting) comes from
# RavenPack RPA 1.0 Global Macro (Dow Jones Edition) via WRDS — NOT from this
# whitelist. RavenPack is not ingested as text; it provides weekly article counts.
#
# Cut and do not reinstate as pipeline sources:
#   Reuters, Bloomberg, WSJ, NYT, Economist, FT, CNBC, FT Alphaville,
#   CFR, Axios, Barron's, MarketWatch, Common Crawl, NewsAPI, GDELT,
#   ProQuest TDM Studio, Factiva.
#
# retrieval values:
#   fed_direct     — federalreserve.gov structured endpoints (FOMC, speeches, etc.)
#   institutional_rss — RSS/Atom feed from institution's site
#   direct_fetch   — direct HTTP fetch of known URL patterns
#   wayback_cdx    — Wayback CDX API for historical bulk; RSS for live (Phase 6)
# =============================================================================

schema_version: "2.0.0"

# -----------------------------------------------------------------------------
# Tier 1 — Institutional policy
# -----------------------------------------------------------------------------
tier_1_institutional_policy:

  - id: fed_board
    name: "Federal Reserve Board"
    domains: ["federalreserve.gov"]
    retrieval: fed_direct
    document_types:
      - fomc_statements
      - fomc_minutes
      - fomc_transcripts
      - governor_speeches
      - monetary_policy_reports
      - beige_book
      - financial_stability_reports
    notes: "All FOMC communications. Timestamp = release date (not meeting date)."

  - id: fed_ny
    name: "Federal Reserve Bank of New York — Liberty Street Economics"
    domains: ["newyorkfed.org"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://libertystreeteconomics.newyorkfed.org/feed/"
    cdx_url_patterns:
      - "libertystreeteconomics.newyorkfed.org/"
    notes: "Research blog; full posts. Also fetch staff reports directly."

  - id: fed_sf
    name: "Federal Reserve Bank of San Francisco — Economic Letter"
    domains: ["frbsf.org"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://www.frbsf.org/economic-research/publications/economic-letter/feed/"
    cdx_url_patterns:
      - "www.frbsf.org/economic-research/publications/economic-letter/"
    notes: "FRBSF Economic Letter; full posts."

  - id: fed_chicago
    name: "Federal Reserve Bank of Chicago — Chicago Fed Letter"
    domains: ["chicagofed.org"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://www.chicagofed.org/publications/chicago-fed-letter/rss"
    cdx_url_patterns:
      - "www.chicagofed.org/publications/chicago-fed-letter/"
    notes: "Chicago Fed Letter; full posts."

  - id: fed_atlanta
    name: "Federal Reserve Bank of Atlanta — macroblog"
    domains: ["atlantafed.org"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://www.atlantafed.org/blogs/macroblog/rss"
    cdx_url_patterns:
      - "www.atlantafed.org/blogs/macroblog/"
    notes: "Atlanta Fed macroblog; full posts."

  - id: imf
    name: "International Monetary Fund"
    domains: ["imf.org"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://www.imf.org/en/News/rss?RSS=RSS&Cat=PB"
      - "https://www.imf.org/en/Blogs/rss"
      - "https://www.imf.org/en/Publications/WP/rss"
    document_types:
      - weo
      - gfsr
      - working_papers
      - article_iv_summaries
      - imf_blog
    notes: "WEO/GFSR/WPs/Article IV summaries + IMF Blog. Filter to publications, not press releases."

  - id: bis
    name: "Bank for International Settlements"
    domains: ["bis.org"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://www.bis.org/doclist/bis_rss.rss"
    document_types:
      - quarterly_review
      - annual_report
      - working_papers
    cdx_url_patterns:
      - "www.bis.org/speeches/"
      - "www.bis.org/review/"
      - "www.bis.org/publ/"

  - id: cea
    name: "Council of Economic Advisers"
    domains: ["whitehouse.gov"]
    retrieval: direct_fetch
    cdx_url_patterns:
      - "www.whitehouse.gov/cea/"
    notes: "Economic Reports of the President, annual reports, issue briefs."

  - id: cbo
    name: "Congressional Budget Office"
    domains: ["cbo.gov"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://www.cbo.gov/publication/rss"
    document_types:
      - budget_outlook
      - economic_outlook
      - working_papers
    notes: "Budget and Economic Outlook; long-run projections; working papers."

  - id: treasury_ofr
    name: "Treasury / OFR / FSOC"
    domains: ["home.treasury.gov", "financialresearch.gov", "home.treasury.gov/policy-issues/financial-markets"]
    retrieval: direct_fetch
    document_types:
      - ofr_annual_reports
      - ofr_working_papers
      - fsoc_annual_reports
      - treasury_reports
    notes: "OFR Annual Reports + Working Papers; FSOC Annual Reports; Treasury economic reports."

# -----------------------------------------------------------------------------
# Tier 2 — Academic analytical
# -----------------------------------------------------------------------------
tier_2_academic_analytical:

  - id: nber
    name: "NBER Working Papers"
    domains: ["nber.org"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://www.nber.org/rss/new_working_papers.xml"
    jel_codes_include:
      - "E"    # Macroeconomics and Monetary Economics
      - "F"    # International Economics
      - "G"    # Financial Economics
    document_content: "abstract_plus_introduction"
    notes: "Abstracts + introductions (not full PDFs). Filter to JEL E/F/G. Timestamp = posting date."

  - id: ssrn_finance
    name: "SSRN — Financial Economics Network"
    domains: ["ssrn.com"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://papers.ssrn.com/sol3/Jrnls/jrnl.cfm?link=2"  # Finance
    networks_include:
      - "Financial Economics Network"
      - "Macroeconomics and Monetary Economics Network"
    document_content: "abstract_only"
    notes: "Abstracts only (full text access inconsistent). Excludes Wayback — SSRN URLs contain query strings."

  - id: voxeu
    name: "VoxEU / CEPR"
    domains: ["cepr.org", "voxeu.org"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://cepr.org/voxeu/rss.xml"
    cdx_url_patterns:
      - "cepr.org/voxeu/columns/"
      - "voxeu.org/article/"
    notes: "Full posts. Feed goes back to 2007; clean RSS. Accessible without paywall."

# -----------------------------------------------------------------------------
# Tier 3 — Policy-journalism bridge
# -----------------------------------------------------------------------------
tier_3_policy_journalism:

  - id: brookings
    name: "Brookings Institution"
    domains: ["brookings.edu"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://www.brookings.edu/topic/economic-studies/feed/"
      - "https://www.brookings.edu/topic/economy/feed/"
    cdx_url_patterns:
      - "www.brookings.edu/articles/"
      - "www.brookings.edu/research/"
    notes: "Economic Studies section only. Full posts."

  - id: piie
    name: "Peterson Institute for International Economics"
    domains: ["piie.com"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://www.piie.com/rss/all"
    cdx_url_patterns:
      - "www.piie.com/blogs/"
      - "www.piie.com/research/"
      - "www.piie.com/publications/"
    notes: "Full posts. Strong macro-financial coverage."

# -----------------------------------------------------------------------------
# Tier 4 — Open journalism
#
# Rationale for two-source Tier 4:
#   AP News   — wire journalism: event detection, factual coverage, clean timestamps.
#               Fully open, consistent Wayback CDX coverage 2010-present.
#   MarketWatch — analytical financial journalism: interpretive/framing pieces at
#               the wire-to-analysis intersection AP misses. 15-20 macro analytical
#               pieces per day. Fully open, Dow Jones property.
#
# Stated limitation (document in methodology, not a gap to patch):
#   Premium analytical press — WSJ opinion, Bloomberg Opinion, FT — is not
#   represented in the semantic corpus in text form. Their volume signal is
#   partially captured by the RavenPack dynamics layer (Dow Jones edition covers
#   WSJ, DJN, Barron's, and MarketWatch). This is an acknowledged scope
#   constraint, disclosed in pre-registration and methodology section.
# -----------------------------------------------------------------------------
tier_4_open_journalism:

  - id: apnews
    name: "AP News"
    domains: ["apnews.com"]
    retrieval: wayback_cdx
    cdx_url_patterns:
      - "apnews.com/article/"
      - "apnews.com/business/"
      - "apnews.com/economy/"
    live_rss: "https://feeds.apnews.com/rss/business"
    historical_start: "2010-01-01"
    notes: "Wire journalism, event detection. Full articles. Historical via Wayback CDX (2010-present); live via RSS (Phase 6)."

  - id: marketwatch
    name: "MarketWatch"
    domains: ["marketwatch.com"]
    retrieval: wayback_cdx
    cdx_url_patterns:
      - "www.marketwatch.com/story/"
    live_rss: "https://feeds.marketwatch.com/marketwatch/topstories/"
    historical_start: "2010-01-01"
    coverage_note: >
      Pre-2015 Wayback CDX coverage is thinner than post-2015. Treat as
      consistent from 2015-01-01 onward for cross-year comparison. Pre-2015
      articles are ingested when available but flagged in corpus composition
      QA. Document this asymmetry explicitly in methodology and pre-registration.
    notes: >
      Analytical financial journalism — interpretive and framing pieces AP does not
      produce. Fully open (no paywall). Dow Jones property; also covered by RavenPack
      dynamics layer (MKW source_id). Historical via Wayback CDX; live via RSS (Phase 6).
      Reinstatement rationale: ADR-009.

# -----------------------------------------------------------------------------
# Dynamics layer — NOT ingested as text corpus
# -----------------------------------------------------------------------------
# RavenPack RPA 1.0 Global Macro, Dow Jones Edition (via WRDS).
# Used ONLY for weekly article volume counts per narrative cluster.
# Do not feed RavenPack records into embedding or clustering.
dynamics_layer:
  - id: ravenpack_rpa_global_macro
    name: "RavenPack RPA 1.0 Global Macro, Dow Jones Edition"
    access: wrds
    wrds_dataset: "ravenpack.rpa_dj_pub"
    use_for: "weekly_volume_counts"
    covers: ["WSJ", "Barron's", "Dow Jones Newswires", "MarketWatch", "PR Newswire", "~800 other sources"]
    notes: "Metadata and event records only — no full text. Use for volume normalization before SIR/logistic fitting."

# -----------------------------------------------------------------------------
# Validation supplements — not ingested as text corpus
# -----------------------------------------------------------------------------
validation_supplements:
  - id: fred
    name: "FRED (Federal Reserve Economic Data)"
    use_for: "validation_correlation"
    series: ["CPIAUCSL", "PCEPI", "UNRATE", "T10Y2Y", "VIXCLS", "BAMLH0A0HYM2"]
    notes: "CPI, PCE, unemployment, yield curve, VIX, credit spreads. Via fredapi."

  - id: nber_cycles
    name: "NBER Business Cycle Dating"
    use_for: "validation_correlation"
    notes: "Recession dates. Hardcode from NBER website (rarely updated)."

  - id: jln_uncertainty
    name: "Jurado-Ludvigson-Ng Uncertainty Indices"
    use_for: "validation_correlation"
    access: wrds
    wrds_dataset: "macro_finance_society"
    notes: "Macro and Financial Uncertainty indices. Use as validation correlation series, not pipeline input."

  - id: umich_inflation_exp
    name: "University of Michigan Inflation Expectations"
    use_for: "validation_correlation"
    fred_series: "MICH"
    notes: "Via FRED. 1-year inflation expectations."

# -----------------------------------------------------------------------------
# Archived / superseded sources (do not reinstate without new ADR)
# -----------------------------------------------------------------------------
# The following were considered and rejected or removed in prior phases:
#
# GDELT            — replaced by RavenPack for dynamics layer (ADR-005, superseded by ADR-007)
# Common Crawl     — coverage inconsistency across years; removed Phase 2
# ProQuest TDM     — paywalled text pipeline removed Phase 2 (corpus shift to open sources)
# Factiva          — license prohibits pipeline use; FT access unconfirmed
# NewsAPI          — live-only, insufficient historical depth
# Reuters          — WRDS subscription does not include Reuters text; dynamics only via RavenPack
# Bloomberg        — text paywalled and not in accessible dataset
# WSJ              — ProQuest no longer used as pipeline source
# NYT Business     — ProQuest no longer used as pipeline source
# Economist        — ProQuest no longer used as pipeline source
# FT / FT Alphaville — Factiva (prohibited) and paywall issues
# CNBC             — dropped: noisy, low analytical depth
# CFR              — dropped: geopolitical framing dominates
# Axios            — dropped: insufficient coverage pre-2020
