# =============================================================================
# Outlet / Source Whitelist — Phase 2 Basis-Set Architecture (ADR-020)
# =============================================================================
# Finalized 2026-05-20 per ADR-020 (basis-set framing). The semantic corpus
# is the minimum set of sources spanning the eight independent dimensions of
# US macro discourse; redundant or noise-dominated sources are excluded.
#
# Basis dimension → source mapping (ADR-020):
#
#   1. US monetary authority           fed_board (Fed Board: FOMC, speeches,
#                                                 Beige Book, FEDS Notes,
#                                                 MPR, FSR, Jackson Hole)
#   2. US monetary research voice      fed_ny, fed_sf, fed_chicago, fed_atlanta
#   3. International macro authority   imf (WEO/GFSR/F&D/Blog/WPs via Coveo +
#                                           curl_cffi, ADR-014)
#   4. International CB network        bis (Quarterly Review + Working Papers +
#                                           Bulletins + curated CB speeches,
#                                           ADR-017)
#   5. US fiscal authority             cbo (Budget/Economic Outlook via
#                                            Playwright + curl_cffi, ADR-017)
#                                       cea (Economic Report of the President
#                                            via govinfo.gov ERP, ADR-020)
#   6. US financial-stability research treasury_ofr (OFR Working Papers +
#                                                    FSOC Annual Reports)
#   7. US policy think-tank            brookings (Economic Studies + Hutchins)
#                                       piie (international-policy commentary)
#   8. Academic primary work           nber (direct URL enumeration, ADR-020)
#      Academic-policy column          voxeu (CEPR full posts)
#
#   Cross-cutting Q&A register         congressional (Treasury Sec testimony;
#                                                     Fed Chair via fed.py)
#
# REMOVED (ADR-020):
#   cfr — basis-set redundancy with piie on the international-policy dimension.
#         ~80% of CFR output is foreign-policy non-macro; the macro subset
#         overlaps PIIE almost completely. Class retained in
#         src/mnd/ingestion/institutional.py for backwards-compat data reads
#         but is unwired from InstitutionalIngestor._sub_ingestors.
#   ssrn — only 30-90 day RSS window; no public historical archive.
#
# RESTORED (ADR-020):
#   nber — Phase 6 live-RSS-only restriction lifted. Direct URL enumeration
#          of /papers/wNNNNN works (no Cloudflare/DataDome on paper detail
#          pages; citation_* meta tags give structured metadata).
#
# Pre-clustering topic keyword filter REMOVED (ADR-020):
#   The basis-set source selection is the only macro-content scope constraint
#   at ingest. Topic relevance is decided post-clustering by
#   mnd.clustering.jel_classifier — clusters are labeled with their primary
#   JEL code from cluster-representative documents, and non-macro clusters
#   (primary JEL ∉ {E, F, G, H}) are excluded from dynamics analysis only.
#   config/topic_filter_keywords.yaml archived to
#   scripts/archive/topic_filter_keywords_archived_adr020.yaml.
#
# JOURNALISM TIER REMOVED (ADR-010):
#   AP News, Reuters, MarketWatch — removed from semantic corpus. Their
#   journalism propagation signal is captured by the Media Cloud Premium
#   dynamics layer (Layer 1B, ADR-016).
#
# LAYER 2 — DETECTION (story counts only, no embedding):
#   Media Cloud — daily story count time series by keyword/topic query.
#   Fires candidate emergence flags before institutional characterization.
#
# retrieval values:
#   fed_direct        — federalreserve.gov structured endpoints
#   institutional_rss — RSS/Atom feed from institution's site
#   direct_fetch      — direct HTTP fetch of known URL patterns
#   mediacloud_api    — Media Cloud API (detection layer only; no text)
# =============================================================================

schema_version: "3.0.0"

# -----------------------------------------------------------------------------
# Tier 1 — Institutional policy
# -----------------------------------------------------------------------------
tier_1_institutional_policy:

  - id: fed_board
    name: "Federal Reserve Board"
    domains: ["federalreserve.gov"]
    retrieval: fed_direct
    document_types:
      - fomc_statements
      - fomc_minutes
      - fomc_transcripts
      - governor_speeches
      - monetary_policy_reports
      - beige_book
      - financial_stability_reports
    notes: "All FOMC communications. Timestamp = release date (not meeting date)."

  - id: fed_ny
    name: "Federal Reserve Bank of New York — Liberty Street Economics"
    domains: ["newyorkfed.org"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://libertystreeteconomics.newyorkfed.org/feed/"
    cdx_url_patterns:
      - "libertystreeteconomics.newyorkfed.org/"
    notes: "Research blog; full posts. Also fetch staff reports directly."

  - id: fed_sf
    name: "Federal Reserve Bank of San Francisco — Economic Letter"
    domains: ["frbsf.org"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://www.frbsf.org/economic-research/publications/economic-letter/feed/"
    cdx_url_patterns:
      - "www.frbsf.org/economic-research/publications/economic-letter/"
    notes: "FRBSF Economic Letter; full posts."

  - id: fed_chicago
    name: "Federal Reserve Bank of Chicago — Chicago Fed Letter"
    domains: ["chicagofed.org"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://www.chicagofed.org/publications/chicago-fed-letter/rss"
    cdx_url_patterns:
      - "www.chicagofed.org/publications/chicago-fed-letter/"
    notes: "Chicago Fed Letter; full posts."

  - id: fed_atlanta
    name: "Federal Reserve Bank of Atlanta — macroblog"
    domains: ["atlantafed.org"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://www.atlantafed.org/blogs/macroblog/rss"
    cdx_url_patterns:
      - "www.atlantafed.org/blogs/macroblog/"
    notes: "Atlanta Fed macroblog; full posts."

  - id: imf
    name: "International Monetary Fund"
    domains: ["imf.org"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://www.imf.org/en/News/rss?RSS=RSS&Cat=PB"
      - "https://www.imf.org/en/Blogs/rss"
      - "https://www.imf.org/en/Publications/WP/rss"
    document_types:
      - weo
      - gfsr
      - working_papers
      - article_iv_summaries
      - imf_blog
    notes: "WEO/GFSR/WPs/Article IV summaries + IMF Blog. Filter to publications, not press releases."

  - id: bis
    name: "Bank for International Settlements"
    domains: ["bis.org"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://www.bis.org/doclist/bis_rss.rss"
    document_types:
      - quarterly_review
      - annual_report
      - working_papers
    cdx_url_patterns:
      - "www.bis.org/speeches/"
      - "www.bis.org/review/"
      - "www.bis.org/publ/"

  - id: cea
    name: "Council of Economic Advisers"
    domains: ["api.govinfo.gov", "www.govinfo.gov"]
    retrieval: govinfo_api
    govinfo_collection: "ERP"
    api_key_env: "GOVINFO_API_KEY"
    document_types:
      - cea_erp_chapter
    notes: >
      Economic Report of the President via the GPO govinfo.gov JSON API
      (collection code ERP). 61 packages back to 1947 with chapter-level
      granules; PDF text extraction via pypdf. ADR-020 (2026-05-20).

  - id: cbo
    name: "Congressional Budget Office"
    domains: ["cbo.gov"]
    retrieval: direct_fetch
    document_types:
      - budget_outlook
      - economic_outlook
      - working_papers
      - monthly_budget_review
      - cost_estimate
      - blog_post
    notes: >
      Full cbo.gov archive via Playwright + curl_cffi hybrid (ADR-017).
      Playwright headless Chromium clears the DataDome JS challenge once,
      curl_cffi-with-cookies handles the ~25,000-URL sitemap walk.
      govinfo.gov is NOT a viable replacement: GPO-deposit coverage is
      uneven over time (~40 records 2010, ~6 records 2024) and would
      introduce a non-random time-varying filter into the volume time
      series. The Playwright path is the methodologically clean choice
      (ADR-020 strategic call, 2026-05-20).

  # NOTE: Jackson Hole speeches are Fed Chair and governor speeches published on
  # federalreserve.gov — captured by the fed_board ingestor above. No separate
  # jackson_hole entry is needed. A separate ingestor was removed in ADR-012 to
  # avoid duplicates. (MND_PROJECT_SPEC rev3, 2026-05-13)

  - id: congressional
    name: "Congressional Testimony — Treasury Secretary"
    domains: ["home.treasury.gov"]
    retrieval: direct_fetch
    document_types:
      - congressional_testimony
    scope: "Treasury Secretary only. Fed Chair testimony is ingested via fed.py."
    notes: "Senate Banking Committee and House Financial Services Committee testimony only."

  - id: treasury_ofr
    name: "Treasury / OFR / FSOC"
    domains: ["home.treasury.gov", "financialresearch.gov", "home.treasury.gov/policy-issues/financial-markets"]
    retrieval: direct_fetch
    document_types:
      - ofr_annual_reports
      - ofr_working_papers
      - fsoc_annual_reports
      - treasury_reports
    notes: "OFR Annual Reports + Working Papers; FSOC Annual Reports; Treasury economic reports."

# -----------------------------------------------------------------------------
# Tier 2 — Academic analytical
# -----------------------------------------------------------------------------
tier_2_academic_analytical:

  - id: nber
    name: "NBER Working Papers"
    domains: ["nber.org"]
    retrieval: direct_fetch
    document_types:
      - nber_working_paper
    historical_corpus: true   # ADR-020: direct URL enumeration restores historical access
    notes: >
      Sequential /papers/wNNNNN enumeration. Paper detail pages are not
      bot-protected (plain Drupal/nginx); citation_* meta tags expose
      title/authors/date/DOI/PDF URL in Google Scholar convention.
      No JEL pre-filter at ingest (ADR-020) — every paper is ingested
      and JEL classification is applied post-clustering by
      mnd.clustering.jel_classifier. Earlier ADR-017/019 deletion was
      premised on a search-API restriction that does not apply to
      paper detail pages. Body = abstract via trafilatura.

  # arXiv removed in ADR-012 / MND_PROJECT_SPEC rev3 (2026-05-13):
  # 2017-only coverage, low macro volume, not in spec.
  # Ingestor archived at scripts/archive/arxiv_ingestor.py.

  - id: voxeu
    name: "VoxEU / CEPR"
    domains: ["cepr.org", "voxeu.org"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://cepr.org/voxeu/rss.xml"
    cdx_url_patterns:
      - "cepr.org/voxeu/columns/"
      - "voxeu.org/article/"
    notes: "Full posts. Feed goes back to 2007; clean RSS. Accessible without paywall."

  - id: ssrn
    name: "SSRN Financial Economics Network"
    domains: ["ssrn.com"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://papers.ssrn.com/sol3/Jrnls/jrnl.cfm?link=2"    # Financial Economics
      - "https://papers.ssrn.com/sol3/jrnls/jrnl.cfm?link=30"   # Macroeconomics
    historical_corpus: false   # SSRN exposes only 30–90 day RSS window; no public historical archive
    phase_6_live: true
    notes: "Abstract-only records. Phase 6 live RSS updates only — no historical archive accessible."

# -----------------------------------------------------------------------------
# Tier 2 — Academic-analytical (continued): Policy-journalism bridge
# (Formerly Tier 3 — merged with Tier 2 per ADR-010 / MND_PROJECT_SPEC.md)
# -----------------------------------------------------------------------------
tier_2_policy_analytical:

  - id: brookings
    name: "Brookings Institution"
    domains: ["brookings.edu"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://www.brookings.edu/topic/economic-studies/feed/"
      - "https://www.brookings.edu/topic/economy/feed/"
    cdx_url_patterns:
      - "www.brookings.edu/articles/"
      - "www.brookings.edu/research/"
    notes: "Economic Studies section only. Full posts."

  - id: piie
    name: "Peterson Institute for International Economics"
    domains: ["piie.com"]
    retrieval: institutional_rss
    rss_feeds:
      - "https://www.piie.com/rss/all"
    cdx_url_patterns:
      - "www.piie.com/blogs/"
      - "www.piie.com/research/"
      - "www.piie.com/publications/"
    notes: "Full posts. Strong macro-financial coverage."

# CFR removed by ADR-020 (basis-set redundancy with PIIE on the
# international-policy dimension; ~80% of CFR output is foreign-policy
# non-macro; the macro subset overlaps PIIE almost completely).
# CFRIngestor class retained in src/mnd/ingestion/institutional.py for
# backwards-compatible reads of pre-ADR-020 data files; not wired into
# InstitutionalIngestor and not run in any new ingest.

# -----------------------------------------------------------------------------
# JOURNALISM TIER REMOVED (ADR-010)
# -----------------------------------------------------------------------------
# AP News, Reuters, and MarketWatch have been removed from the semantic corpus.
# Their journalism propagation signal is captured by the RavenPack dynamics
# layer (Layer 1B via WRDS). Ingestors are archived in scripts/archive/.
# Raw ingested JSONL from Phase 2 RCC ingestion remains in data/raw/articles/
# but is excluded from embedding by scripts/filter_corpus_pre_embed.py.
#
# STATED LIMITATION (documented in methodology and pre-registration):
#   Premium analytical press — WSJ opinion, Bloomberg Opinion, FT — is not
#   represented in the semantic corpus in text form. Their volume signal is
#   captured by the RavenPack dynamics layer (Dow Jones edition covers WSJ,
#   DJN, Barron's, MarketWatch, and ~800 others). This is an acknowledged
#   scope constraint, not an oversight.

# -----------------------------------------------------------------------------
# Dynamics layer — NOT ingested as text corpus
# -----------------------------------------------------------------------------
# Media Cloud premium-press collection (ADR-016 / ADR-019). Queried via the
# Media Cloud API for weekly story counts matching each narrative's top
# c-TF-IDF terms. Used as a CROSS-VALIDATION signal -- the primary SIR/logistic
# fit target is institutional discourse volume (the narrative formation layer).
# RavenPack/WRDS abandoned (ADR-016, 2026-05-18).
dynamics_layer:
  - id: mediacloud_premium
    name: "Media Cloud premium press collection"
    access: api
    api_env: "MEDIACLOUD_API_KEY"
    use_for: "weekly_press_volume_per_narrative_cross_validation"
    covers: ["WSJ", "Bloomberg", "FT", "Reuters", "NYT", "Barron's", "Dow Jones Newswires", "MarketWatch"]
    notes: "Story counts only -- no text ingested. Query string is the narrative's top c-TF-IDF terms joined with Boolean OR (reproducible from clustering output)."

# -----------------------------------------------------------------------------
# Validation supplements — not ingested as text corpus
# -----------------------------------------------------------------------------
validation_supplements:
  - id: fred
    name: "FRED (Federal Reserve Economic Data)"
    use_for: "validation_correlation"
    series: ["CPIAUCSL", "PCEPI", "UNRATE", "T10Y2Y", "VIXCLS", "BAMLH0A0HYM2"]
    notes: "CPI, PCE, unemployment, yield curve, VIX, credit spreads. Via fredapi."

  - id: nber_cycles
    name: "NBER Business Cycle Dating"
    use_for: "validation_correlation"
    notes: "Recession dates. Hardcode from NBER website (rarely updated)."

  - id: epu
    name: "Baker-Bloom-Davis Economic Policy Uncertainty Index"
    use_for: "validation_correlation"
    url: "https://www.policyuncertainty.com/us_monthly.html"
    access: "direct_download"
    notes: >
      Monthly news-based EPU index, 1985–present. Free direct download from
      policyuncertainty.com. Replaces JLN (ADR-010): EPU is constructed from
      newspaper text coverage of uncertainty — directly comparable to this
      system's narrative detection. Concordance between detected narrative
      emergence and EPU spikes is the primary face-validity benchmark.

  - id: umich_inflation_exp
    name: "University of Michigan Inflation Expectations"
    use_for: "validation_correlation"
    fred_series: "MICH"
    notes: "Via FRED. 1-year inflation expectations. Earmarked for removal in a future phase."

# -----------------------------------------------------------------------------
# Detection layer — story counts only, no text embedding (ADR-010)
# -----------------------------------------------------------------------------
detection_layer:
  - id: mediacloud
    name: "Media Cloud"
    access: api
    api_key_env: "MEDIACLOUD_API_KEY"
    api_url: "https://api.mediacloud.org/api/v2/"
    provides: "daily_story_counts_by_keyword"
    output_dir: "data/detection/mediacloud"
    role: >
      Layer 2 detection: fires candidate narrative flags before institutional
      sources have characterized a topic in embeddable text. Daily story counts
      per keyword/topic query across thousands of outlets, 2010-present.
      Does NOT provide text — detection only. Do not feed into embedding.
    notes: >
      API key: MEDIACLOUD_API_KEY in .env. Output: data/detection/mediacloud/.
      Emergence flag fires when topic volume exceeds threshold or shows
      anomalous growth vs. baseline.

# -----------------------------------------------------------------------------
# Archived / superseded sources (do not reinstate without new ADR)
# -----------------------------------------------------------------------------
# The following were considered and rejected or removed:
#
# AP News      — Removed from semantic corpus (ADR-010, 2026-05-11). Wire journalism
#                adds noise; journalism propagation captured by RavenPack dynamics
#                layer. Raw JSONL from Phase 2 ingestion retained in data/raw/articles/.
#                Ingestor archived in scripts/archive/apnews_ingestor.py.
#                Phase 6 live RSS remains possible if needed.
#
# Reuters      — Removed from semantic corpus (ADR-010, 2026-05-11). Added 2026-05-07,
#                removed same session. Same rationale as AP News.
#                Ingestor archived in scripts/archive/reuters_ingestor.py.
#
# MarketWatch  — Removed from semantic corpus (ADR-010, 2026-05-11). Reinstated
#                in ADR-009, removed again. Dow Jones / RavenPack provides the
#                MarketWatch volume signal without scraping.
#
# CBO          — Active in the composite via the sitemap-enumeration path (ADR-013).
#                cbo.gov/sitemap.xml is not bot-protected; publication detail pages
#                are accessible from RCC (university IP) but 403 from residential
#                IPs (DataDome). Legacy RSS/listing scrape retained as fallback.
#
# SSRN         — Exposes only 30–90 day RSS window; no public bulk API for
#                historical archive. Phase 6 live-update pipeline only.
#
# NBER         — Historical bulk retrieval failed (bot-protected, JS-rendered).
#                Phase 6 live RSS only.
#
# JLN Uncertainty — Replaced by EPU (Baker-Bloom-Davis) in ADR-010.
#                   EPU is text-based and directly comparable to this system.
#
# GDELT        — Replaced by RavenPack for dynamics layer (ADR-005/ADR-007).
#                Archived at scripts/archive/gdelt_ingestor.py.
#
# Common Crawl — Coverage inconsistency across years; removed Phase 2.
# ProQuest TDM — Paywalled text pipeline removed Phase 2.
#                Archived at scripts/archive/proquest_ingestor.py.
# Factiva      — License prohibits pipeline use.
# NewsAPI      — Live-only, insufficient historical depth.
#                Archived at scripts/archive/newsapi_ingestor.py.
# Bloomberg    — Text paywalled.
# WSJ, NYT, Economist, FT — ProQuest/Factiva not used.
# CNBC         — Noisy, low analytical depth.
# Axios        — Insufficient coverage pre-2020.
