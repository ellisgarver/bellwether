# =============================================================================
# Outlet Whitelist
# =============================================================================
# ~30-40 outlets organized by tier. The whitelist is the *gate* on what enters
# the corpus — GDELT URLs from outlets not on this list are discarded.
#
# Each entry includes:
#   - domain: matched against GDELT source URL (case-insensitive, www-stripped)
#   - aliases: alternate domains for the same outlet
#   - tier: 1-3 (see below)
#   - access: free | paywalled | mixed
#   - retrieval: how full text is obtained (gdelt_url | fed_site | factiva | proquest | rss | none)
#   - notes: outlet-specific quirks
#
# Tiers:
#   Tier 1 — Core analytical financial press. Highest priority. Required.
#   Tier 2 — Adjacent analytical publications. Strong macro focus.
#   Tier 3 — Institutional / official sources. Free, authoritative.
#
# DO NOT add Tier 4 (general business news, blogs) without explicit
# scope-change documentation. Adding noise here propagates to every
# downstream stage.
# =============================================================================

schema_version: "1.0.0"

# -----------------------------------------------------------------------------
# Corpus design (Phase 2 decision, 2026-05-01):
#
# Tight corpus for temporal consistency:
#   Tier 1 ProQuest (TDM Studio): WSJ, NYT (business), Economist
#   Tier 2 Wayback/free:          Reuters, Bloomberg (not in ProQuest GN)
#   Tier 3 Institutional:         Fed, IMF, BIS, NBER, etc. (unchanged)
#
# Dropped from primary analysis (moved to supplementary_outlets below):
#   Barron's, MarketWatch, Foreign Affairs, Project Syndicate
#   Reason: ProQuest GN temporal coverage gaps; would bias cross-year comparisons.
#
# FT retained but flagged: TDM Studio dataset does not include FT.
# FT kept as factiva for now; revisit if UChi library access confirmed.
# -----------------------------------------------------------------------------

tier_1_core_financial_press:
  - id: wsj
    name: "Wall Street Journal"
    domains: ["wsj.com"]
    access: paywalled
    retrieval: proquest
    notes: "Anchor outlet. In TDM Studio 'macro narratives dataset' (2010-present)."

  - id: ft
    name: "Financial Times (US edition)"
    domains: ["ft.com"]
    access: paywalled
    retrieval: factiva
    notes: "Not in TDM Studio dataset; Factiva access pending confirmation. Kept in corpus; review in Phase 3."

  - id: bloomberg
    name: "Bloomberg News"
    domains: ["bloomberg.com"]
    access: mixed
    retrieval: wayback
    cdx_url_patterns:
      - "www.bloomberg.com/news/articles/"
      - "www.bloomberg.com/news/features/"
      - "www.bloomberg.com/news/newsletters/"
      - "www.bloomberg.com/markets/"
    notes: "Not in ProQuest Global Newsstream; Tier 2 wire — use Wayback CDX for 2010-present historical bulk, NewsAPI for Phase 6 live updates."

  - id: reuters
    name: "Reuters"
    domains: ["reuters.com"]
    access: mixed
    retrieval: wayback
    cdx_url_patterns:
      - "www.reuters.com/markets/"
      - "www.reuters.com/business/"
      - "www.reuters.com/world/us/"
      - "www.reuters.com/breakingviews/"
    notes: "Not in ProQuest Global Newsstream; Tier 2 wire — use Wayback CDX for historical, NewsAPI for Phase 6. Filter aggressively to analytical pieces."

  - id: nyt_business
    name: "New York Times Business / DealBook"
    domains: ["nytimes.com"]
    section_filter: ["business", "dealbook", "economy"]
    access: paywalled
    retrieval: proquest
    notes: "In TDM Studio dataset. Section filter critical; full paper is too broad."

  - id: economist
    name: "The Economist"
    domains: ["economist.com"]
    access: paywalled
    retrieval: proquest
    notes: "In TDM Studio dataset. Finance & economics + briefings sections only."

  - id: cnbc
    name: "CNBC"
    domains: ["cnbc.com"]
    access: free
    retrieval: wayback
    cdx_url_patterns:
      - "www.cnbc.com/2010/"
      - "www.cnbc.com/2011/"
      - "www.cnbc.com/2012/"
      - "www.cnbc.com/2013/"
      - "www.cnbc.com/2014/"
      - "www.cnbc.com/2015/"
      - "www.cnbc.com/2016/"
      - "www.cnbc.com/2017/"
      - "www.cnbc.com/2018/"
      - "www.cnbc.com/2019/"
      - "www.cnbc.com/2020/"
      - "www.cnbc.com/2021/"
      - "www.cnbc.com/2022/"
      - "www.cnbc.com/2023/"
      - "www.cnbc.com/2024/"
      - "www.cnbc.com/2025/"
    notes: "Free but noisy; require keyword match and length>500 words."

tier_2_adjacent_analytical:
  - id: bloomberg_opinion
    name: "Bloomberg Opinion"
    domains: ["bloomberg.com"]
    access: mixed
    retrieval: wayback
    cdx_url_patterns:
      - "www.bloomberg.com/opinion/"
    notes: "Tagged separately from Bloomberg News for narrative-vs-news separation."

  - id: voxeu
    name: "VoxEU / CEPR"
    domains: ["cepr.org", "voxeu.org"]
    access: free
    retrieval: wayback
    cdx_url_patterns:
      - "cepr.org/voxeu/columns/"
      - "voxeu.org/article/"

  - id: ft_alphaville
    name: "FT Alphaville"
    domains: ["ftalphaville.ft.com"]
    access: free
    retrieval: wayback
    cdx_url_patterns:
      - "ftalphaville.ft.com/2010/"
      - "ftalphaville.ft.com/2011/"
      - "ftalphaville.ft.com/2012/"
      - "ftalphaville.ft.com/2013/"
      - "ftalphaville.ft.com/2014/"
      - "ftalphaville.ft.com/2015/"
      - "ftalphaville.ft.com/2016/"
      - "ftalphaville.ft.com/2017/"
      - "ftalphaville.ft.com/2018/"
      - "ftalphaville.ft.com/2019/"
      - "ftalphaville.ft.com/2020/"
      - "ftalphaville.ft.com/2021/"
      - "ftalphaville.ft.com/2022/"
      - "ftalphaville.ft.com/2023/"
      - "ftalphaville.ft.com/2024/"
      - "ftalphaville.ft.com/2025/"

  - id: brookings_econ
    name: "Brookings Economic Studies"
    domains: ["brookings.edu"]
    section_filter: ["economy", "research/economic-studies"]
    access: free
    retrieval: wayback
    cdx_url_patterns:
      - "www.brookings.edu/articles/"
      - "www.brookings.edu/research/"
      - "www.brookings.edu/blog/"

  - id: peterson
    name: "Peterson Institute for International Economics"
    domains: ["piie.com"]
    access: free
    retrieval: wayback
    cdx_url_patterns:
      - "www.piie.com/blogs/"
      - "www.piie.com/research/"
      - "www.piie.com/publications/"

  - id: cfr
    name: "Council on Foreign Relations"
    domains: ["cfr.org"]
    section_filter: ["world", "geoeconomics"]
    access: free
    retrieval: wayback
    cdx_url_patterns:
      - "www.cfr.org/article/"
      - "www.cfr.org/backgrounder/"
      - "www.cfr.org/in-brief/"
      - "www.cfr.org/report/"
    notes: "Filter to economic/financial pieces; foreign policy generalist content out of scope."

  - id: axios_macro
    name: "Axios Macro"
    domains: ["axios.com"]
    section_filter: ["business", "economy"]
    access: free
    retrieval: wayback
    cdx_url_patterns:
      - "www.axios.com/2020/"
      - "www.axios.com/2021/"
      - "www.axios.com/2022/"
      - "www.axios.com/2023/"
      - "www.axios.com/2024/"
      - "www.axios.com/2025/"

tier_3_institutional:
  - id: federalreserve
    name: "Federal Reserve Board"
    domains: ["federalreserve.gov"]
    access: free
    retrieval: fed_site
    notes: "FOMC statements, minutes, Beige Book, speeches, MPRs."

  - id: frb_ny
    name: "Federal Reserve Bank of New York"
    domains: ["newyorkfed.org"]
    access: free
    retrieval: fed_site
    cdx_url_patterns:
      - "www.newyorkfed.org/research/staff_reports/"
      - "www.newyorkfed.org/research/epr/"
      - "www.newyorkfed.org/medialibrary/media/research/"

  - id: frb_sf
    name: "Federal Reserve Bank of San Francisco"
    domains: ["frbsf.org"]
    access: free
    retrieval: fed_site
    cdx_url_patterns:
      - "www.frbsf.org/research/publications/"
      - "www.frbsf.org/economic-research/"

  - id: imf
    name: "International Monetary Fund"
    domains: ["imf.org"]
    access: free
    retrieval: institutional_site
    cdx_url_patterns:
      - "www.imf.org/en/News/Articles/"
      - "www.imf.org/en/Publications/WP/"
      - "www.imf.org/en/Blogs/"
    notes: "WPs + Article IVs + WEO/GFSR; filter to publications, not press releases."

  - id: bis
    name: "Bank for International Settlements"
    domains: ["bis.org"]
    access: free
    retrieval: institutional_site
    cdx_url_patterns:
      - "www.bis.org/speeches/"
      - "www.bis.org/review/"
      - "www.bis.org/publ/"
    notes: "Working Papers + Quarterly Reviews."

  - id: oecd
    name: "OECD Economics"
    domains: ["oecd.org"]
    section_filter: ["economy", "finance"]
    access: free
    retrieval: institutional_site
    cdx_url_patterns:
      - "www.oecd.org/en/publications/"
      - "www.oecd.org/economic-outlook/"

  - id: nber
    name: "NBER Working Papers"
    domains: ["nber.org"]
    access: free
    retrieval: institutional_site
    cdx_url_patterns:
      - "www.nber.org/papers/"
    notes: "Macro/finance categories only; filter to relevant JEL codes."

  - id: ssrn_finance
    name: "SSRN — Financial Economics Network"
    domains: ["ssrn.com"]
    access: free
    retrieval: institutional_site
    notes: "Free abstracts always; many full PDFs free in finance. Excluded from Wayback — article URLs always contain query strings."

  - id: cea
    name: "Council of Economic Advisers"
    domains: ["whitehouse.gov/cea", "cea.gov"]
    access: free
    retrieval: gov_site
    cdx_url_patterns:
      - "www.whitehouse.gov/cea/"

  - id: bea
    name: "Bureau of Economic Analysis"
    domains: ["bea.gov"]
    access: free
    retrieval: gov_site
    cdx_url_patterns:
      - "www.bea.gov/news/"
      - "www.bea.gov/research/"

# -----------------------------------------------------------------------------
# Supplementary outlets — dropped from primary corpus (Phase 2 decision,
# 2026-05-01) due to ProQuest GN temporal coverage gaps. May be re-added
# as a sensitivity-analysis corpus in Phase 4. Do not ingest by default.
# -----------------------------------------------------------------------------
supplementary_outlets:
  - id: barrons
    name: "Barron's"
    domains: ["barrons.com"]
    access: paywalled
    retrieval: proquest
    excluded_reason: "ProQuest GN temporal coverage gaps; dropped for corpus consistency."

  - id: marketwatch
    name: "MarketWatch"
    domains: ["marketwatch.com"]
    access: free
    retrieval: wayback
    cdx_url_patterns:
      - "www.marketwatch.com/story/"
    excluded_reason: "Dropped for corpus consistency with ProQuest tier. High volume, low analytical depth."

  - id: foreign_affairs
    name: "Foreign Affairs"
    domains: ["foreignaffairs.com"]
    access: paywalled
    retrieval: proquest
    excluded_reason: "Primarily geopolitical; macro-financial signal too sparse to justify inclusion."

  - id: project_syndicate
    name: "Project Syndicate"
    domains: ["project-syndicate.org"]
    access: free
    retrieval: wayback
    cdx_url_patterns:
      - "www.project-syndicate.org/commentary/"
      - "www.project-syndicate.org/onpoint/"
      - "www.project-syndicate.org/bigpicture/"
    excluded_reason: "Dropped for corpus consistency; op-ed rather than news-cycle discourse."

# -----------------------------------------------------------------------------
# Explicit OUT-OF-SCOPE list — outlets we permanently exclude.
# Documented to make the exclusion deliberate and auditable.
# -----------------------------------------------------------------------------
excluded_outlets:
  - { domain: "seekingalpha.com",  reason: "User-generated; quality variance too high" }
  - { domain: "zerohedge.com",     reason: "Editorial slant skews narrative formation" }
  - { domain: "investopedia.com",  reason: "Reference material, not narrative discourse" }
  - { domain: "fool.com",          reason: "Single-stock retail focus; out of macro scope" }
  - { domain: "benzinga.com",      reason: "Real-time wire; reverse-causality concern" }
  - { domain: "yahoo_finance",     reason: "Aggregator with heavy ticker noise; dropped in Phase 2 for corpus quality" }
  - { domain: "forbes.com",        reason: "Mixed quality; contributor model inflates volume" }
  - { domain: "businessinsider.com", reason: "Section filter insufficient to separate macro from general business" }
  - { domain: "politico.com",      reason: "Political framing dominates; macro-financial signal weak" }
  - { domain: "theatlantic.com",   reason: "Low volume in macro-financial section; coverage uneven pre-2018" }
  - { domain: "foreignpolicy.com", reason: "Geopolitical focus; dropped with Foreign Affairs for scope consistency" }
