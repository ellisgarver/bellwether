# =============================================================================
# Macro Narrative Dynamics — Master Configuration
# =============================================================================
# This file locks every parameter that must be pre-specified for reproducibility
# and to guard against post-hoc tuning. See Appendix A of the project plan.
#
# DO NOT MODIFY VALUES UNDER `locked` AFTER PHASE 1 PILOT IS COMPLETE without
# documenting the change in docs/architecture_decisions.md and incrementing
# the schema_version below.
# =============================================================================

schema_version: "2.0.0"  # bumped by ADR-019 (2026-05-20) — comprehensive methodology lock-in
project_name: "macro-narrative-dynamics"

# -----------------------------------------------------------------------------
# Temporal scope
# -----------------------------------------------------------------------------
temporal:
  historical_start: "2010-01-01"
  historical_end: "auto"            # "auto" = today minus 7d (handled in code)
  # No train/test split — ADR-040: zero hand-tuning removes the overfitting risk a
  # held-out boundary would guard against; full 2010-present series is used throughout.
  live_update_frequency: "weekly"   # cron: weekly batch
  live_update_day: "monday"         # day of week for the cron trigger

# -----------------------------------------------------------------------------
# Embedding (locked — ADR-001, restored by ADR-011)
# -----------------------------------------------------------------------------
# Two-model strategy:
#
#  PRIMARY (production): Qwen3-Embedding-0.6B
#    - 32,768 token context — essential for long-form institutional corpus
#      (FOMC minutes 10-15k words, BIS QR 3-8k words, Jackson Hole 8-15k words)
#    - Apache 2.0, top-tier MTEB. Instruction-aware.
#    - Training cutoff ~2025: look-ahead exposure exists; mitigated by formal
#      sensitivity check (ADR-011). Local MPS: MND_MAX_SEQ_LEN=512 (ADR-006).
#
#  COMPARATOR (look-ahead sensitivity check only, not used for production):
#    - all-mpnet-base-v2, training cutoff ~2020-2021, max 384 tokens.
#    - Run on the 10 anchor narrative sub-corpora to compare NMI/silhouette
#      across pre-2021 vs post-2021 windows against primary (ADR-011).
#    - If Qwen3 Δ_NMI(post-2021 − pre-2021) > 0.15 AND mpnet does not show
#      the same pattern → document as look-ahead; caveat in pre-registration.
#
embedding:
  primary:
    model: "Qwen/Qwen3-Embedding-8B"  # ADR-036 (was 0.6B); top-tier MTEB, A100-only
    revision: "1d8ad4ca9b3dd8059ad90a75d4983776a23d44af"  # pinned for the one-shot run (was "main"); HF Qwen3-Embedding-8B main @ 2026-06-15
    dimensions: 4096               # ADR-036 (was 1024); 8B native output dim
    # On RCC (CUDA A100 40 GB, gpu partition --constraint=a100): max_seq_len=1024,
    # batch_size=8, fp16 — 8B ≈ 16 GB fp16 weights, comfortable on 40 GB (ADR-036).
    # On Apple Silicon (MPS): export MND_MAX_SEQ_LEN=512 to avoid OOM (ADR-006).
    # Chunker (per ADR-019) produces 512-Qwen3-token chunks, well within both.
    # Embedding dim does NOT flow into BERTopic — UMAP reduces any input dim to
    # n_components=5, so the clustering params (config below) are unchanged (ADR-036).
    max_seq_len: 1024
    instruction_aware: true
    instruction_prefix: "Instruct: Represent this financial policy document for narrative clustering\nQuery: "
    # No upgrade_path — 8B is the top of the Qwen3-Embedding family.
  # Comparator (mpnet) look-ahead sensitivity check removed by ADR-019 (2026-05-20).
  # The negative finding from the prior look-ahead check (ADR-011) is preserved
  # as historical evidence in the project record; the apparatus itself is not
  # part of the active methodology under the "anchored or removed" principle.

# -----------------------------------------------------------------------------
# Document chunking (ADR-019) — pre-embedding processing
# -----------------------------------------------------------------------------
# Anchored to Thakur et al. 2021 BEIR (NeurIPS): 512 tokens is the field-standard
# retrieval unit. Chunker uses the embedding model's own tokenizer (Qwen3
# SentencePiece) so chunk size in tokens maps 1:1 to the model's context window.
# Documents that fit within 512 tokens produce one chunk naturally; no
# word-count gate.
processing:
  chunking:
    chunk_tokens: 512
    chunk_overlap: 64              # ~12.5%; LangChain/LlamaIndex 10-20% default band

# -----------------------------------------------------------------------------
# Clustering — BERTopic library defaults (ADR-019)
# -----------------------------------------------------------------------------
# Every parameter is the BERTopic v0.16.4 library default (Grootendorst 2022,
# arXiv:2203.05794). No sensitivity sweeps; no researcher-tuned overrides. The
# three-tier granularity hierarchy with silhouette thresholds (ADR-008) is
# removed — published BERTopic narrative studies report at single granularity
# (Bybee/Kelly/Manela/Xiu 2024 JF; Hansen/McMahon/Prat 2018 QJE; Larsen &
# Thorsrud 2019 JoE; Bertsch et al. 2021 Economics Letters).
clustering:
  framework: "bertopic"
  umap:
    n_neighbors: 15                # BERTopic default
    min_dist: 0.0                  # BERTopic default (overrides umap-learn 0.1)
    n_components: 5                # BERTopic default
    metric: "cosine"               # BERTopic default
    random_state: 42               # global_random_seed
  hdbscan:
    min_cluster_size: 10           # BERTopic default (was researcher-chosen 20)
    # min_samples omitted: BERTopic + hdbscan default is None (falls back to min_cluster_size)
    cluster_selection_method: "eom"  # BERTopic default
    metric: "euclidean"            # operates on UMAP-reduced space; BERTopic default
  ctfidf:
    reduce_frequent_words: false   # BERTopic ClassTfidfTransformer default (was researcher-chosen true)
    bm25_weighting: false          # BERTopic ClassTfidfTransformer default (was researcher-chosen true)
  # Post-cluster JEL scope classification (ADR-020/046, display flag not a gate).
  jel:
    # Representative documents appended to the c-TF-IDF terms when building each
    # cluster's JEL representation (ADR-055). Terms alone are too thin a signal —
    # adding BERTopic representative-doc text recovers core macro clusters (r-star,
    # Basel) that bare terms sent to the "Y" catch-all, and stops Y over-attracting.
    n_representative_docs: 3

# -----------------------------------------------------------------------------
# Dynamics fitting (ADR-019)
# -----------------------------------------------------------------------------
# Two classical diffusion models. SIR: Kermack & McKendrick 1927. Logistic:
# Verhulst 1838. Gompertz (1825, biological) and bare exponential dropped --
# no narrative-economics anchor and SIR's early phase approximates exponential
# anyway. Primary fit target is institutional discourse volume (the formation
# layer); Media Cloud premium/broad press volumes are cross-validation signals,
# not fit targets.
dynamics:
  smoothing_window_days: 7         # 7-day centered MA on combined weekly volume.
                                   # Natural weekly cycle for daily count data
                                   # (Shumway & Stoffer). Source-stratified
                                   # smoothing removed by ADR-019.
  # Fit/display floor (ADR-051): only clusters with at least this many unique
  # articles are fit, staged, and surfaced on the front end (map, narratives,
  # emerging, search). BERTopic at the library-default min_cluster_size (ADR-019)
  # yields ~7k micro-topics (median ~7 articles) — too few points to identify a
  # 3-parameter lifecycle curve. The floor is set by the identifiability bound
  # (~10 obs/parameter → ~30 minimum); 42 clears it with margin and is fixed by
  # convention to the project's reproducibility.global_random_seed. The map no
  # longer draws static edges (focus-lit on hover, ADR-044), so the binding
  # constraint is identifiability, not on-screen clutter. Sub-threshold clusters
  # stay in clusters.parquet and are reported as an aggregate count
  # (n_clusters_total); clustering is untouched, so this is a post-hoc display
  # selection, not a tuned hyperparameter (ADR-040 holds — fixed a priori, never
  # adjusted to improve anchor recovery).
  min_articles_to_fit: 42
  # Four lenses shown side by side, not selected by AICc. shape-facts is
  # model-free (no entry here -- always computed). The fits are display lenses
  # only; stage classification is model-free and does not key off any fit.
  models_to_fit:
    - "sir"                        # Kermack & McKendrick 1927 — "contagious? burn out?"
    - "logistic"                   # Verhulst 1838 — "how fast / where level off?"
    - "bass"                       # Bass 1969 — "external shock vs word-of-mouth?"
  inference:
    framework: "pymc"
    draws: 2000
    tune: 1000
    chains: 4
    target_accept: 0.95
    cores: "auto"                  # min(chains, available_cpus)
    random_seed: 42
  # SIR-only integration grid (ADR-053). SIR is integrated for NUTS by a
  # pytensor.scan Euler loop with n_steps = T-1, so its gradient cost is O(series
  # length); logistic and Bass are vectorized and unaffected. Binning the
  # already-7-day-smoothed daily series to a weekly grid before the SIR scan cuts
  # the scan ~7x. The displayed curve and the model-free stage stay daily; only
  # SIR's integration resolution changes. R_0 = beta/gamma is dimensionless so it
  # is grid-invariant; the per-week fitted rates are converted to per-day for the
  # displayed curve and peak time (see dynamics/fitting.py).
  sir_fit_grid_days: 7
  # SIR-only inference budget (ADR-053). R_0 is display-only post ADR-052, so this
  # cheaper sampler applies only to the expensive SIR lens; logistic and Bass keep
  # the production `inference` budget above. It cannot affect anchor recovery (a
  # clustering metric, independent of any fit), so the no-tuning rule (ADR-040)
  # holds — this is a Monte-Carlo-precision setting, not a tuned parameter.
  sir_inference:
    framework: "pymc"
    draws: 500
    tune: 500
    chains: 2
    target_accept: 0.9
    cores: "auto"                  # min(chains, available_cpus)
    random_seed: 42
  priors:
    # Weakly informative, anchored to Bjornstad 2018 "Epidemics: Models and
    # Data using R" + Gelman et al. BDA3 conventions. Specific values pending
    # implementation commit (sub-ADR-020 if non-trivial).
    sir:
      beta_mean: 0.3
      beta_sd: 0.5
      gamma_mean: 0.1
      gamma_sd: 0.2
    logistic:
      L_log_mean: 5.0              # log(carrying capacity) prior mean
      L_log_sd: 2.0
      k_mean: 0.2
      k_sd: 0.1
    bass:
      # Anchored to Sultan, Farley & Lehmann 1990 meta-analysis of 213 Bass
      # applications: mean p (innovation) ~= 0.03, mean q (imitation) ~= 0.38.
      # LogNormal keeps p, q strictly positive as the Bass model requires.
      p_log_mean: -3.5             # log(0.03) ~= -3.5; coefficient of innovation
      p_log_sd: 1.0
      q_log_mean: -0.97            # log(0.38) ~= -0.97; coefficient of imitation
      q_log_sd: 0.5
      m_log_sd: 2.0                # market potential; centered on observed total volume in code
  # min_r_squared and max_r0_ci_width kill criteria removed by ADR-019.
  # R^2 and R_0 credible interval width are reported as diagnostics, not gated.

# -----------------------------------------------------------------------------
# Detection / display overlays (ADR-042/048) — display & validation only, never
# fed into embedding, clustering, or dynamics fitting.
# -----------------------------------------------------------------------------
detection:
  mediacloud:
    # Per-narrative press query = OR of this many top c-TF-IDF terms. The terms
    # are the data-driven cluster keywords (no hand-picked query string, so the
    # no-tuning rule holds); 6 balances topical specificity against an over-narrow
    # query that returns near-zero press counts.
    query_top_terms: 6

# -----------------------------------------------------------------------------
# Stage classification — model-free attention-trajectory test
# -----------------------------------------------------------------------------
# Stage is read off the recent shape of each narrative's own volume curve, not a
# fitted model. Two non-parametric rank tests over the recent window W decide it:
#   growth  -- significant upward trend   (modified Mann-Kendall, Hamed & Rao 1998)
#   decay   -- significant downward trend
#   stable  -- no trend, but recent level sits significantly above the narrative's
#              own quiet floor (one-sided Mann-Whitney U): a high plateau
#   dormant -- no trend and at floor: faded out / unresolved
# W reuses the emerging window, so no separate horizon is tuned; alpha is the
# single significance convention. The tests gate on significance, not on any
# tuned magnitude. SIR R_0 is a display-only headline for the SIR lens, not a gate.
stages:
  trend_alpha: 0.05                # significance level for both rank tests
  growth_min_r0: 1.0               # SIR-lens display headline only; no longer a stage gate
  newly_emerging_recency_weeks: 4  # recent window W and emerging flag; sharp-anchor windows + Brown & Warner 1985

# -----------------------------------------------------------------------------
# Filtering & deduplication (ADR-020)
# -----------------------------------------------------------------------------
# Pre-clustering JEL keyword filter REMOVED by ADR-020 (2026-05-20). The
# basis-set source selection is now the only macro-content scope constraint
# at ingest time; topic relevance is decided post-clustering by
# mnd.clustering.jel_classifier over BERTopic cluster representatives.
# The filter stage performs date-range filtering and MinHash near-duplicate
# removal only.
filtering:
  dedup:
    method: "minhash"
    num_perm: 128                  # Broder 1997; datasketch library default
    threshold: 0.85                # Henzinger 2006 mid-band for near-duplicate detection

  # Sub-document boilerplate removal (ADR-054). Sentence-level cross-document
  # repetition strip applied after MinHash dedup, before embedding. Removes
  # disclaimers, donation disclosures, media-contact blocks, and speech caveats
  # repeated verbatim across many documents — text with no per-document signal
  # that otherwise forms artifact clusters. Document count, never topic, is the
  # only input (ADR-020 intact); thresholds are absolute document counts.
  boilerplate:
    enabled: true
    min_doc_frequency: 25          # normalized sentence in >= this many distinct documents = template (Bar-Yossef & Rajagopalan 2002; Kohlschütter et al. 2010)
    min_sentence_words: 6          # only sentences this long are eligible to strip (protects common short phrases)
    min_content_words: 50          # post-strip articles below this, that were actually stripped, are dropped as content-free shells

# -----------------------------------------------------------------------------
# Validation (ADR-019)
# -----------------------------------------------------------------------------
# Anchor recovery rate is reported, not gated. No kill criteria with researcher-
# set thresholds. Bootstrap replicate count bumped from 20 to 1000 per Efron &
# Tibshirani 1993 ("B >= 500-1000 for confidence intervals"). The look-ahead
# sensitivity-check apparatus (ADR-011) is removed; the negative finding from
# the prior run is preserved as historical evidence.
validation:
  anchor_tolerance_days: 14        # Brown & Warner 1985 event-study window convention
  bootstrap_replicates: 1000       # Efron & Tibshirani 1993 (B >= 500-1000 for CIs)
  bootstrap_random_seed: 42
  fdr_alpha: 0.05                  # Benjamini & Hochberg 1995

# -----------------------------------------------------------------------------
# Reproducibility (locked)
# -----------------------------------------------------------------------------
reproducibility:
  global_random_seed: 42
  python_version_required: ">=3.11,<3.13"
  numpy_random_state_pinned: true
  data_snapshot_dir: "data/snapshots"
  config_versioning: "git"         # Config changes must commit

# -----------------------------------------------------------------------------
# Compute & I/O
# -----------------------------------------------------------------------------
compute:
  # embedding_batch_size dropped 32 → 8 after job 49622334 OOMed on V100-16GB
  # (2026-05-13). Inference batch size has zero quality impact — same vectors
  # come out — it's purely a perf/VRAM tradeoff. At seq=1024+fp16, batch=8 is
  # safe headroom on V100 16GB; raise back to 16 or 32 on A100 partitions.
  embedding_batch_size: 8
  embedding_device: "auto"         # auto | cuda | cuda:0 | cpu | mps
  embedding_fp16: true             # Use half precision where supported
  ingestion_max_workers: 4
  cache_dir: ".cache"

# -----------------------------------------------------------------------------
# Storage paths
# -----------------------------------------------------------------------------
paths:
  raw_articles: "data/raw/articles"
  raw_validation: "data/raw/validation"
  corpus_for_embedding: "data/processed/corpus_for_embedding.jsonl"  # filtered; excludes archived journalism sources
  processed_articles: "data/processed/articles.parquet"
  processed_chunks: "data/processed/chunks.parquet"
  processed_embeddings: "data/processed/embeddings.npy"
  processed_clusters: "data/processed/clusters.parquet"
  processed_dynamics: "data/processed/dynamics.parquet"
  dynamics_institutional: "data/dynamics/institutional"               # Primary fit signal (institutional corpus counts)
  dynamics_mediacloud_premium: "data/dynamics/mediacloud_premium"     # Cross-validation: Media Cloud premium press volume
  detection_mediacloud: "data/detection/mediacloud"                   # Layer 2: Media Cloud broad story counts
  dashboard_artifacts: "data/processed/dashboard"
  logs: "logs"
