name: Deploy site (GitHub Pages)

# Builds the Astro site from code on `main` + baked dashboard artifacts on the
# orphan `site-data` branch (force-pushed weekly by scripts/rcc/update_rcc.sh)
# and deploys to gh-pages. Keeping the ~380 MB dashboard on a force-pushed
# snapshot branch keeps main's history code-only and the repo from bloating
# (ADR-063). This replaces the local `npx gh-pages` step in publish.sh for the
# autonomous weekly loop.
#
# Prereqs (one-time): Settings > Pages serves from the `gh-pages` branch
# (already the current source). No secret needed — GITHUB_TOKEN is built in.

# NOTE: update_rcc.sh copies this file INTO each site-data snapshot — GitHub
# only runs push-triggered workflows that exist on the pushed ref, so without
# the copy a site-data push would trigger nothing. Keep this file self-contained.
on:
  push:
    branches: [main, site-data]   # code changes on main, or a fresh weekly snapshot
  workflow_dispatch:

permissions:
  contents: write        # peaceiris pushes the built site to gh-pages

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (main)
        uses: actions/checkout@v4
        with:
          ref: main

      # Artifacts live on the orphan snapshot branch. continue-on-error so the
      # workflow doesn't fail before the first weekly push has created it.
      - name: Checkout artifacts (site-data)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: site-data
          path: _site-data

      - name: Check for baked dashboard artifacts
        id: artifacts
        run: |
          if ls _site-data/data/processed/dashboard/*.json >/dev/null 2>&1; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No site-data dashboard artifacts yet — skipping build/deploy."
          fi

      - uses: actions/setup-node@v4
        if: steps.artifacts.outputs.present == 'true'
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        if: steps.artifacts.outputs.present == 'true'
        working-directory: web
        run: npm ci

      - name: Build site
        if: steps.artifacts.outputs.present == 'true'
        working-directory: web
        env:
          SITE: https://ellisgarver.github.io
          BASE: /bellwether
          # Point the Astro build at the snapshot artifacts (web/src/lib/data.ts
          # honors DASHBOARD_DATA_DIR) — no copy step needed.
          DASHBOARD_DATA_DIR: ${{ github.workspace }}/_site-data/data/processed/dashboard
        run: npm run build

      - name: Deploy to gh-pages
        if: steps.artifacts.outputs.present == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
          publish_branch: gh-pages
          force_orphan: true       # keep gh-pages a single snapshot (no history bloat)
          commit_message: "deploy: ${{ github.sha }}"
